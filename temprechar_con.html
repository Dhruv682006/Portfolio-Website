<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #1e252b;
            color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .converter-container {
            background-color: #2a323d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            color: #4da6ff;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #cbd5e1;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #3f4e60;
            border-radius: 6px;
            background-color: #1e252b;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #4da6ff;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #4da6ff;
            color: #1e252b;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #358ee0;
        }
        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        .result-container {
            margin-top: 25px;
            padding: 15px;
            background-color: #1e252b;
            border-left: 5px solid #4da6ff;
            border-radius: 4px;
            display: none;
        }
        .result-title {
            font-size: 14px;
            color: #8a99ad;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .result-value {
            font-size: 18px;
            font-weight: bold;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="converter-container">
    <h2>Temperature Converter</h2>
    
    <!-- 1. Input Field (Validated) -->
    <div class="form-group">
        <label for="tempInput">Enter Temperature:</label>
        <input type="text" id="tempInput" placeholder="e.g., 32 or 100.5">
        <div id="errorMsg" class="error-message">Please enter a valid number!</div>
    </div>
    
    <!-- 2. Source Unit Selection -->
    <div class="form-group">
        <label>From Unit:</label>
        <div class="radio-group">
            <label class="radio-label"><input type="radio" name="fromUnit" value="C" checked> Celsius (°C)</label>
            <label class="radio-label"><input type="radio" name="fromUnit" value="F"> Fahrenheit (°F)</label>
            <label class="radio-label"><input type="radio" name="fromUnit" value="K"> Kelvin (K)</label>
        </div>
    </div>

    <!-- Extra Challenge: Target Unit Selection -->
    <div class="form-group">
        <label for="toUnit">To Unit:</label>
        <select id="toUnit">
            <option value="F">Fahrenheit (°F)</option>
            <option value="C">Celsius (°C)</option>
            <option value="K">Kelvin (K)</option>
        </select>
    </div>
    
    <!-- 3. Convert Button -->
    <button onclick="convertTemperature()">Convert</button>
    
    <!-- 4. Display Area -->
    <div id="resultContainer" class="result-container">
        <div class="result-title">Converted Results:</div>
        <div id="resultValue" class="result-value"></div>
    </div>
</div>

<script>
    function convertTemperature() {
        const inputVal = document.getElementById('tempInput').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        const resultContainer = document.getElementById('resultContainer');
        const resultValue = document.getElementById('resultValue');
        
        // Dynamic reading of radio button choice
        const fromUnit = document.querySelector('input[name="fromUnit"]:checked').value;
        const toUnit = document.getElementById('toUnit').value;

        // Validation logic: Ensure the field isn't blank and is a strict valid numeric value
        if (inputVal === "" || isNaN(inputVal)) {
            errorMsg.style.display = "block";
            resultContainer.style.display = "none";
            return;
        }
        errorMsg.style.display = "none";
        
        const temp = parseFloat(inputVal);
        let tempInCelsius;

        // First step: Convert everything to a baseline (Celsius)
        if (fromUnit === "C") {
            tempInCelsius = temp;
        } else if (fromUnit === "F") {
            tempInCelsius = (temp - 32) * 5 / 9;
        } else if (fromUnit === "K") {
            // Absolute zero guard for Kelvin
            if (temp < 0) {
                errorMsg.textContent = "Kelvin cannot be below absolute zero (0 K)!";
                errorMsg.style.display = "block";
                resultContainer.style.display = "none";
                return;
            }
            tempInCelsius = temp - 273.15;
        }

        // Reset error message text just in case it changed
        errorMsg.textContent = "Please enter a valid number!";

        // Second step: Convert from Celsius baseline to the target unit
        let finalTemp;
        let unitLabel = "";

        if (toUnit === "C") {
            finalTemp = tempInCelsius;
            unitLabel = "°C";
        } else if (toUnit === "F") {
            finalTemp = (tempInCelsius * 9 / 5) + 32;
            unitLabel = "°F";
        } else if (toUnit === "K") {
            finalTemp = tempInCelsius + 273.15;
            unitLabel = "K";
            // Guard edge-case rounding near absolute zero
            if (finalTemp < 0) finalTemp = 0; 
        }

        // Format to a clean output (max 2 decimal places if needed)
        const roundedOutput = Number(finalTemp.toFixed(2));
        
        // Build the symbol formats for the display string
        const fromLabels = { 'C': '°C', 'F': '°F', 'K': 'K' };
        
        // Display final output
        resultValue.innerHTML = `${temp}${fromLabels[fromUnit]} = <strong>${roundedOutput}${unitLabel}</strong>`;
        resultContainer.style.display = "block";
    }
</script>

</body>
</html>
